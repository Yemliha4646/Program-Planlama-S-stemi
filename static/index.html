<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Program Planlama Sistemi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .card-container {
        perspective: 1200px;
      }
      .flashcard {
        transform-style: preserve-3d;
        transition: transform 0.6s ease;
        display: flex;
        flex-direction: column;
        position: relative;
        min-height: 120px;
      }
      .flashcard.flipped {
        transform: rotateY(180deg);
      }
      .card-face {
        backface-visibility: hidden;
        position: relative;
        padding: 0.75rem;
      }
      .card-back {
        transform: rotateY(180deg);
      }
    </style>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <div class="mx-auto max-w-6xl p-4">
      <header class="mb-8 text-center">
        <h1 class="text-4xl font-bold text-emerald-400">Program Planlama Sistemi</h1>
        <p class="mt-2 text-slate-300">Sınavları takip edin, flashcardlarla çalışın ve Leitner planınızı yönetin.</p>
      </header>

      <section class="grid gap-6 lg:grid-cols-2">
        <div class="rounded-3xl bg-slate-900 p-6 shadow-xl shadow-slate-900/20">
          <h2 class="mb-4 text-2xl font-semibold text-white">Yeni Sınav Oluştur</h2>
          <form id="exam-form" class="space-y-4">
            <label class="block">
              <span class="mb-2 block text-slate-300">Ders Adı</span>
              <input id="exam-course" required maxlength="100" class="w-full rounded-2xl border border-slate-700 bg-slate-950 px-4 py-3 text-slate-100 outline-none focus:border-emerald-400" />
            </label>
            <label class="block">
              <span class="mb-2 block text-slate-300">Sınav Tarihi</span>
              <input id="exam-date" type="date" required class="w-full rounded-2xl border border-slate-700 bg-slate-950 px-4 py-3 text-slate-100 outline-none focus:border-emerald-400" />
            </label>
            <button class="w-full rounded-2xl bg-emerald-500 px-5 py-3 font-semibold text-slate-950 transition hover:bg-emerald-400">Sınav Kaydet</button>
          </form>
        </div>

        <div class="rounded-3xl bg-slate-900 p-6 shadow-xl shadow-slate-900/20">
          <h2 class="mb-4 text-2xl font-semibold text-white">Sınavlar</h2>
          <div id="exams-list" class="space-y-3"></div>
        </div>
      </section>

      <section id="details-section" class="mt-8 hidden rounded-3xl bg-slate-900 p-6 shadow-xl shadow-slate-900/20">
        <div class="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
          <div>
            <h2 class="text-2xl font-semibold text-white">Seçili Sınav</h2>
            <p id="selected-exam" class="text-slate-300"></p>
          </div>
          <div class="grid gap-3 sm:grid-cols-3">
            <div class="rounded-3xl bg-slate-800 p-4 text-center">
              <p class="text-xs uppercase text-slate-400">Kalan Gün</p>
              <p id="remaining-days" class="mt-2 text-3xl font-semibold text-emerald-400">0</p>
            </div>
            <div class="rounded-3xl bg-slate-800 p-4 text-center">
              <p class="text-xs uppercase text-slate-400">Günlük Hedef</p>
              <p id="daily-target" class="mt-2 text-3xl font-semibold text-emerald-400">0</p>
            </div>
            <div class="rounded-3xl bg-slate-800 p-4 text-center">
              <p class="text-xs uppercase text-slate-400">Tamamlanan</p>
              <p id="completed-today" class="mt-2 text-3xl font-semibold text-emerald-400">0</p>
            </div>
          </div>
        </div>

        <div class="mt-8 grid gap-6 lg:grid-cols-2">
          <div class="rounded-3xl bg-slate-950/50 p-6">
            <h3 class="mb-4 text-xl font-semibold text-white">Flashcard Ekle</h3>
            <form id="flashcard-form" class="space-y-4">
              <label class="block">
                <span class="mb-2 block text-slate-300">Soru / Ön Yüz</span>
                <input id="card-front" maxlength="500" required class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-slate-100 outline-none focus:border-emerald-400" />
              </label>
              <label class="block">
                <span class="mb-2 block text-slate-300">Cevap / Arka Yüz</span>
                <textarea id="card-back" required rows="4" class="w-full rounded-2xl border border-slate-700 bg-slate-900 px-4 py-3 text-slate-100 outline-none focus:border-emerald-400"></textarea>
              </label>
              <button class="w-full rounded-2xl bg-emerald-500 px-5 py-3 font-semibold text-slate-950 transition hover:bg-emerald-400">Kart Oluştur</button>
              <button id="generate-ai-btn" type="button" class="w-full mt-2 rounded-2xl bg-green-600 px-5 py-3 font-semibold text-white transition hover:bg-green-500">Yapay Zeka ile Soru Üret</button>
            </form>
          </div>

          <div class="rounded-3xl bg-slate-950/50 p-6">
            <h3 class="mb-4 text-xl font-semibold text-white">Flashcard Listesi</h3>
            <div id="flashcards-list" class="space-y-4"></div>
          </div>
        </div>
      </section>
    </div>
    <script src="/static/app.js"></script>
  </body>
</html>
